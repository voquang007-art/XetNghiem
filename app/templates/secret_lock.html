<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }} - Mở khoá hành động</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="container" style="max-width:520px;">
    <div class="card">
      <h2>Mở khoá hành động</h2>
      {% if error %}<div class="alert">{{ error }}</div>{% endif %}
      <form method="post" action="/secret-lock">
        <input type="hidden" name="action" value="{{ action }}">
        <label>PIN (nếu được yêu cầu)</label>
        <input type="password" name="pin" placeholder="6–8 chữ số">
        <label>Mã TOTP (nếu được yêu cầu)</label>
        <input type="text" name="otp" placeholder="6 chữ số">
        <button type="submit">Xác nhận</button>
      </form>
      <p style="margin-top:8px;color:#6B7280;">Action: <code>{{ action }}</code></p>
    </div>
  </div>
</body>
</html>
