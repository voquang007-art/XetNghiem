<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }} - Đăng ký</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="register-page">
  <div class="hero-banner">
    <div class="line1">CÔNG TY TNHH BỆNH VIỆN HÙNG VƯƠNG GIA LAI</div>
  </div>

  <div class="center-wrap">
    <div class="panel">
      <img src="/static/images/logo.png" class="logo" alt="Logo">
      <div class="brand-mini">{{ company_name }}</div>
      <h1>Đăng ký tài khoản</h1>
      {% if error %}<div class="alert">{{ error }}</div>{% endif %}

      <!-- Chuẩn hóa action trỏ đúng /auth/register -->
      <form method="post" action="/auth/register" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <div style="grid-column:1 / span 2;">
          <label>Họ và tên</label>
          <input type="text" name="full_name" value="{{ form_data.get('full_name', '') }}" required>
        </div>
        <div>
          <label>Tên đăng nhập</label>
          <input type="text" name="username" value="{{ form_data.get('username', '') }}" required>
        </div>
        <div>
          <label>Email</label>
          <input type="email" name="email" value="{{ form_data.get('email', '') }}">
        </div>
        <div>
          <label>Điện thoại</label>
          <input type="text" name="phone" value="{{ form_data.get('phone', '') }}">
        </div>

        <div style="grid-column:1 / span 2;">
          <label>Đơn vị</label>
          <select name="unit_id" id="unit_id" required onchange="syncPositionOptions(); toggleSecret();">
            <option value="">-- Chọn đơn vị --</option>
            {% for u in units %}
              <option
                value="{{ u.id }}"
                data-cap="{{ u.cap_do }}"
                {% if form_data.get("unit_id", "") == u.id %}selected{% endif %}
              >
                {{ u.ten_don_vi }} - {{ u.unit_type_label }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label>Vị trí đăng ký</label>
          <select name="position" id="position" onchange="toggleSecret()" required>
            {% for p in positions %}
              <option
                value="{{ p.code }}"
                data-requires-secret="{{ '1' if p.requires_secret else '0' }}"
                data-unit-modes="{{ ','.join(p.unit_modes | map('string')) }}"
                {% if form_data.get("position", "NHAN_VIEN") == p.code %}selected{% endif %}
              >
                {{ p.label }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div id="secret_wrap" style="display:none;">
          <label>Khóa bí mật (nếu vị trí yêu cầu)</label>
          <div class="input-group">
            <input type="password" name="secret_code" id="secret_code" value="{{ form_data.get('secret_code', '') }}">
            <button type="button" class="eye-btn" onclick="togglePwd('secret_code')" aria-label="Ẩn/hiện khóa bí mật">
              <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
              </svg>
            </button>
          </div>
          <div style="margin-top:8px; padding:8px 10px; border-radius:8px; background:#fff4cc; color:#8a5a00; font-size:13px; font-weight:600; line-height:1.45; border:1px solid #f1d27a;">{{ secret_notice or "Xin hãy liên lạc admin để nhận mã khóa" }}</div>
        </div>

        <div>
          <label>Mật khẩu</label>
          <div class="input-group">
            <input id="reg_password" type="password" name="password" required>
            <button type="button" class="eye-btn" onclick="togglePwd('reg_password')" aria-label="Ẩn/hiện mật khẩu">
              <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
              </svg>
            </button>
          </div>
        </div>
        <div>
          <label>Nhập lại mật khẩu</label>
          <div class="input-group">
            <input id="reg_confirm" type="password" name="confirm_password" required>
            <button type="button" class="eye-btn" onclick="togglePwd('reg_confirm')" aria-label="Ẩn/hiện mật khẩu">
              <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
              </svg>
            </button>
          </div>
        </div>

        <div style="grid-column:1 / span 2;">
          <button type="submit">Đăng ký</button>
          <div class="links" style="margin-top:6px;">
            <!-- Chuẩn hóa link quay lại đăng nhập -->
            <a href="/auth/login">Quay lại đăng nhập</a>
          </div>
          <div class="sign-credit">Ứng dụng được phát triển bởi Võ Như Minh Quang</div>
        </div>
      </form>
    </div>
  </div>

<script>
  function togglePwd(id){
    const inp = document.getElementById(id);
    if(inp) inp.type = (inp.type === 'password') ? 'text' : 'password';
  }

  function selectedUnitCap(){
    const unitSel = document.getElementById('unit_id');
    if (!unitSel || !unitSel.selectedOptions.length) return "";
    return unitSel.selectedOptions[0].getAttribute('data-cap') || "";
  }

  function syncPositionOptions(){
    const unitCap = selectedUnitCap();
    const posSel = document.getElementById('position');
    if (!posSel) return;

    let firstVisibleValue = "";
    Array.from(posSel.options).forEach(function(opt){
      const modesRaw = opt.getAttribute('data-unit-modes') || "";
      const modes = modesRaw.split(',').map(x => x.trim()).filter(Boolean);

      const visible = !unitCap || modes.includes(unitCap);
      opt.hidden = !visible;

      if (visible && !firstVisibleValue) {
        firstVisibleValue = opt.value;
      }
    });

    const current = posSel.selectedOptions[0];
    if (!current || current.hidden) {
      if (firstVisibleValue) posSel.value = firstVisibleValue;
    }
  }

  function toggleSecret(){
    const posSel = document.getElementById('position');
    const wrap = document.getElementById('secret_wrap');
    if (!posSel || !wrap) return;

    const opt = posSel.selectedOptions[0];
    const need = opt ? (opt.getAttribute('data-requires-secret') === '1') : false;
    wrap.style.display = need ? 'block' : 'none';
  }

  document.addEventListener("DOMContentLoaded", function(){
    syncPositionOptions();
    toggleSecret();
  });
</script>
</body>
</html>
